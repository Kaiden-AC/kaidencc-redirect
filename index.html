<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="refresh" content="10;url=https://kaidenac.com" />
<title>kaiden.cc → kaidenac.com</title>
<style>
  :root {
    --canvas: #0a0d12;
    --card: #10151c;
    --header-bg: #161c25;
    --border: #232b36;
    --fg: #cdd6e0;
    --muted: #7a8699;
    --add-bg: rgba(63, 185, 110, 0.13);
    --add-fg: #4fd881;
    --del-bg: rgba(240, 90, 90, 0.13);
    --del-fg: #ff8383;
    --accent: #6ab0ff;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }

  body {
    background: var(--canvas);
    color: var(--fg);
    font-family: ui-monospace, 'SF Mono', SFMono-Regular, Menlo, Consolas, 'Liberation Mono', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .diff-card {
    width: min(92vw, 560px);
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 8px 28px rgba(0, 0, 0, 0.4);
    animation: cardIn 0.45s ease-out;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .diff-file-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 18px;
    background: var(--header-bg);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }

  .diff-filename { font-weight: 600; color: var(--fg); }
  .diff-stats { font-size: 12px; font-weight: 600; }
  .stat-add { color: var(--add-fg); }
  .stat-del { color: var(--del-fg); margin-left: 6px; }

  .diff-body {
    padding: 16px 0;
    font-size: clamp(13px, 2.6vw, 14.5px);
    line-height: 1.75;
  }

  .diff-meta, .diff-hunk { padding: 1px 20px; color: var(--muted); }
  .diff-hunk { margin-bottom: 6px; }

  .diff-line {
    display: flex;
    align-items: baseline;
    padding: 2px 20px 2px 0;
  }
  .diff-line .marker {
    display: inline-block;
    width: 28px;
    flex-shrink: 0;
    text-align: center;
    user-select: none;
  }
  .diff-line .content { white-space: pre-wrap; word-break: break-word; }

  .diff-del { background: var(--del-bg); color: var(--del-fg); }
  .diff-add { background: var(--add-bg); color: var(--add-fg); margin-bottom: 6px; }

  .diff-comment {
    display: flex;
    align-items: baseline;
    padding: 8px 20px 0;
    color: var(--muted);
    font-style: italic;
  }
  .diff-comment .marker { width: 28px; flex-shrink: 0; text-align: center; }

  .cursor {
    display: inline-block;
    width: 0.5em;
    height: 1em;
    background: currentColor;
    opacity: 0.85;
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  .diff-footer {
    padding: 14px 20px 16px;
    border-top: 1px solid var(--border);
    font-size: clamp(12px, 2.4vw, 13px);
    color: var(--muted);
  }
  .diff-footer a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid transparent;
  }
  .diff-footer a:hover { border-bottom-color: var(--accent); }
  .diff-footer a:focus-visible {
    outline: 2px solid var(--accent);
    outline-offset: 2px;
    border-radius: 2px;
  }

  #countdown-num { color: var(--fg); font-weight: 600; }
  .sep { margin: 0 8px; opacity: 0.5; }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    .diff-card { animation: none; }
    .cursor { animation: none; }
  }
</style>
</head>
<body>

<main class="diff-card">
  <div class="diff-file-header">
    <span class="diff-filename">CNAME</span>
    <span class="diff-stats"><span class="stat-add">+1</span><span class="stat-del">−1</span></span>
  </div>

  <div class="diff-body" id="diff-body" aria-hidden="true">
    <div class="diff-meta">--- a/CNAME</div>
    <div class="diff-meta">+++ b/CNAME</div>
    <div class="diff-hunk">@@ -1 +1 @@</div>
    <div class="diff-line diff-del"><span class="marker">-</span><span class="content" id="typed-del"></span></div>
    <div class="diff-line diff-add"><span class="marker">+</span><span class="content" id="typed-add"></span></div>
    <div class="diff-comment"><span class="marker">#</span><span class="content" id="typed-comment"></span></div>
  </div>

  <p class="sr-only">
    kaiden.cc has permanently moved to kaidenac.com. Please update your bookmarks.
    You will be redirected automatically in 10 seconds, or you can select the link below to go to kaidenac.com now.
  </p>

  <div class="diff-footer">
    redirecting in <span id="countdown-num">10</span>s
    <span class="sep">&middot;</span>
    <a href="https://kaidenac.com">go to kaidenac.com now</a>
  </div>
</main>

<script>
(function () {
  var REDIRECT_URL = 'https://kaidenac.com';
  var REDIRECT_DELAY = 10; // seconds — keep this in sync with the <meta refresh> tag above
  var startTime = Date.now();
  var redirected = false;

  var segments = [
    { el: document.getElementById('typed-del'), text: 'kaiden.cc' },
    { el: document.getElementById('typed-add'), text: 'kaidenac.com' },
    { el: document.getElementById('typed-comment'), text: 'please update your bookmarks' }
  ];

  var cursor = document.createElement('span');
  cursor.className = 'cursor';

  var prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function typeSegment(segIndex, charIndex) {
    segIndex = segIndex || 0;
    charIndex = charIndex || 0;
    if (segIndex >= segments.length) return;

    var seg = segments[segIndex];
    seg.el.parentNode.appendChild(cursor);

    if (charIndex < seg.text.length) {
      seg.el.textContent = seg.text.slice(0, charIndex + 1);
      setTimeout(function () { typeSegment(segIndex, charIndex + 1); }, 32);
    } else {
      setTimeout(function () { typeSegment(segIndex + 1, 0); }, 260);
    }
  }

  function renderInstantly() {
    segments.forEach(function (seg) { seg.el.textContent = seg.text; });
    segments[segments.length - 1].el.parentNode.appendChild(cursor);
  }

  if (prefersReducedMotion) {
    renderInstantly();
  } else {
    typeSegment();
  }

  var countdownNum = document.getElementById('countdown-num');

  function updateCountdown() {
    var elapsed = (Date.now() - startTime) / 1000;
    var remaining = Math.max(0, Math.ceil(REDIRECT_DELAY - elapsed));
    countdownNum.textContent = remaining;
    if (remaining <= 0 && !redirected) {
      redirected = true;
      clearInterval(countdownInterval);
      window.location.href = REDIRECT_URL;
    }
  }

  updateCountdown();
  var countdownInterval = setInterval(updateCountdown, 200);
})();
</script>

</body>
</html>
